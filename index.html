<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="google-site-verification" content="1X83b_K373-WRnJSuQyTlHr4I7JQrZpKKgtdC_BnJKs" />
<title>환율 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:   #f6f6f4;
  --wh:   #ffffff;
  --bd:   #e0e0dc;
  --bd2:  #c4c4be;
  --tx:   #0f0f0e;
  --tx2:  #484844;
  --tx3:  #989890;
  --hov:  #f0f0ec;
  --sel:  #e8e8e4;
  --up:   #1a6e35;
  --upbg: #edf6f1;
  --dn:   #a81a1a;
  --dnbg: #fdf0f0;
  --fl:   #888880;
  --mono: 'Noto Sans Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:14px;line-height:1.5;min-height:100vh}
.page{max-width:1460px;margin:0 auto;padding:0 28px 80px}

/* 헤더 */
header{display:flex;align-items:center;justify-content:space-between;padding:26px 0 18px;border-bottom:2px solid var(--tx);margin-bottom:18px;flex-wrap:wrap;gap:12px}
.wm{font-weight:700;font-size:17px;letter-spacing:-.3px;display:flex;align-items:baseline;gap:10px}
.wms{font-size:11px;font-weight:300;color:var(--tx3);letter-spacing:1px}
.hr{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.upd-info{font-family:var(--mono);font-size:10px;color:var(--tx3);line-height:1.6;text-align:right}
.ts{font-family:var(--mono);font-size:11px;color:var(--tx3)}
.btn{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--tx2);background:var(--wh);border:1px solid var(--bd2);padding:6px 14px;cursor:pointer;border-radius:2px;transition:all .15s;letter-spacing:.3px}
.btn:hover{border-color:var(--tx);color:var(--tx)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* 티커 */
.ticker{background:var(--tx);height:30px;overflow:hidden;display:flex;align-items:center;margin-bottom:16px;border-radius:2px}
.t-in{display:flex;white-space:nowrap;animation:tick 65s linear infinite}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ti{display:inline-flex;align-items:center;gap:7px;padding:0 18px;border-right:1px solid rgba(255,255,255,.1);font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.5)}
.ti .r{color:#fff;font-weight:500}
.ti .u{color:#6ed48a}
.ti .d{color:#f08080}
.ti .f{color:rgba(255,255,255,.28)}

/* 기준통화 바 */
.bbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;background:var(--wh);border:1px solid var(--bd);border-radius:2px;padding:6px 8px}
.bl{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;padding-right:4px}
.barr{background:none;border:1px solid var(--bd);color:var(--tx2);width:26px;height:26px;cursor:pointer;border-radius:2px;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;user-select:none}
.barr:hover{border-color:var(--tx);color:var(--tx)}
.barr:disabled{opacity:.25;cursor:not-allowed}
.bbs-wrap{flex:1;overflow:hidden;position:relative}
.bbs-wrap::before,.bbs-wrap::after{content:'';position:absolute;top:0;bottom:0;width:20px;z-index:1;pointer-events:none}
.bbs-wrap::before{left:0;background:linear-gradient(to right,var(--wh),transparent)}
.bbs-wrap::after{right:0;background:linear-gradient(to left,var(--wh),transparent)}
.bbs{display:flex;gap:4px;transition:transform .25s ease;will-change:transform;padding:1px 2px}
.bb{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;font-family:var(--mono);font-size:11px;font-weight:500;color:var(--tx2);background:transparent;border:1px solid var(--bd);cursor:pointer;border-radius:2px;letter-spacing:.3px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.bb:hover{border-color:var(--tx);color:var(--tx)}
.bb.ac{background:var(--tx);border-color:var(--tx);color:#fff}

/* 메인 그리드 */
.main{display:grid;grid-template-columns:1fr 358px;gap:14px;align-items:start}
@media(max-width:1060px){.main{grid-template-columns:1fr}}

/* 카드 */
.card{background:var(--wh);border:1px solid var(--bd);border-radius:2px}
.ch{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--bd);gap:10px;flex-wrap:wrap}
.ct{font-size:10px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--tx3);white-space:nowrap}

/* 테이블 검색 */
.tsrch{font-family:var(--mono);font-size:12px;color:var(--tx);background:var(--bg);border:1px solid var(--bd);padding:5px 10px;border-radius:2px;width:165px;outline:none;transition:border-color .15s}
.tsrch:focus{border-color:var(--tx)}
.tsrch::placeholder{color:var(--tx3)}

/* 테이블 */
table{width:100%;border-collapse:collapse}
thead th{padding:7px 18px;font-family:var(--mono);font-size:10px;font-weight:500;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;text-align:left;border-bottom:1px solid var(--bd);cursor:pointer;user-select:none;white-space:nowrap;transition:color .15s}
thead th:hover{color:var(--tx2)}
thead th.sd{color:var(--tx)}
thead th.r,tbody td.r{text-align:right}
tbody tr{border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
tbody tr:hover{background:var(--hov)}
tbody tr.sel{background:var(--sel)}
tbody tr:last-child{border-bottom:none}
tbody td{padding:9px 18px}
.cc{display:flex;align-items:center;gap:10px}
.fl{font-size:17px;line-height:1;flex-shrink:0}
.cod{font-family:var(--mono);font-size:13px;font-weight:500}
.nm{font-size:11px;color:var(--tx3);margin-top:1px}
.rv{font-family:var(--mono);font-size:13px;font-weight:500}
.chg{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.cp{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 5px;border-radius:2px}
.ca{font-family:var(--mono);font-size:10px;color:var(--tx3)}
.cpu{background:var(--upbg);color:var(--up)}
.cpd{background:var(--dnbg);color:var(--dn)}
.cpf{background:transparent;color:var(--fl)}
.tcu{color:var(--up)}
.tcd{color:var(--dn)}
.tcf{color:var(--fl)}
.spc{width:70px}
.spc svg{display:block}

/* 우측 패널 */
.rp{display:flex;flex-direction:column;gap:12px;position:sticky;top:16px}
.ph{padding:36px 20px;text-align:center;font-size:12px;color:var(--tx3);line-height:2.4}
.cht{padding:15px 18px 13px;border-bottom:1px solid var(--bd)}
.cfc{display:flex;align-items:center;gap:8px;margin-bottom:2px;flex-wrap:wrap}
.cco{font-family:var(--mono);font-size:20px;font-weight:700}
.cnm{font-size:11px;color:var(--tx3);margin-bottom:8px}
.crt{font-family:var(--mono);font-size:28px;font-weight:300;letter-spacing:-1px;margin-bottom:3px}
.cch{font-family:var(--mono);font-size:13px;font-weight:700;margin-bottom:12px}
.pr{display:flex;gap:4px}
.pb{font-family:var(--mono);font-size:10px;font-weight:500;padding:4px 8px;border:1px solid var(--bd);background:transparent;color:var(--tx3);cursor:pointer;border-radius:2px;letter-spacing:.5px;transition:all .15s}
.pb:hover{border-color:var(--tx2);color:var(--tx2)}
.pb.ac{border-color:var(--tx);background:var(--tx);color:#fff}
.cb{padding:14px}
.cw{height:175px;position:relative}

/* 통계 */
.sg{display:grid;grid-template-columns:1fr 1fr}
.st{padding:11px 18px;border-right:1px solid var(--bd);border-bottom:1px solid var(--bd)}
.st:nth-child(2n){border-right:none}
.st:nth-child(n+3){border-bottom:none}
.sl{font-family:var(--mono);font-size:10px;color:var(--tx3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px}
.sv{font-family:var(--mono);font-size:14px;font-weight:500}

/* 각주 */
.fn{font-size:10px;font-family:var(--mono);color:var(--tx3);padding:7px 18px;border-top:1px solid var(--bd);background:var(--bg);line-height:1.7}
.msg{text-align:center;padding:50px 20px;color:var(--tx3);font-size:12px;line-height:2.4}

/* 뉴스 슬라이더 */
.news-box{background:#0f0f0e;border-radius:3px;margin-bottom:14px;overflow:hidden;position:relative;height:90px;cursor:pointer;user-select:none}
.news-slides{display:flex;height:100%;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.news-slide{min-width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;padding:16px 56px 16px 20px;box-sizing:border-box}
.news-src{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:6px}
.news-ttl{font-size:13px;font-weight:500;color:#fff;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-nav{position:absolute;top:50%;transform:translateY(-50%);right:0;display:flex;flex-direction:column;gap:0}
.news-btn{background:none;border:none;color:rgba(255,255,255,.3);font-size:15px;cursor:pointer;padding:6px 14px;line-height:1;transition:color .15s}
.news-btn:hover{color:rgba(255,255,255,.8)}
.news-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
.nd{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.2);transition:background .3s;cursor:pointer}
.nd.ac{background:rgba(255,255,255,.7)}
.news-loading{display:flex;align-items:center;justify-content:center;height:100%;color:rgba(255,255,255,.25);font-family:var(--mono);font-size:11px;letter-spacing:1px}
</style>
</head>
<body>
<div class="page">

<header>
  <div class="wm">환율 대시보드<span class="wms">FOREX MONITOR</span></div>
  <div class="hr">
    <div class="upd-info" id="updInfo">ECB 기준 · 매일 16:00 CET 갱신</div>
    <div class="ts" id="ts">—</div>
    <button class="btn" id="rb" onclick="fetchAll()">↻ 새로고침</button>
  </div>
</header>

<div class="news-box" id="newsBox">
  <div class="news-slides" id="newsSlides"><div class="news-loading">뉴스 로딩 중…</div></div>
  <div class="news-nav">
    <button class="news-btn" onclick="newsNav(-1)">‹</button>
    <button class="news-btn" onclick="newsNav(1)">›</button>
  </div>
  <div class="news-dots" id="newsDots"></div>
</div>

<div class="ticker"><div class="t-in" id="tk"><div class="ti">불러오는 중…</div></div></div>

<div class="bbar">
  <span class="bl">기준 통화</span>
  <button class="barr" id="bprev" onclick="scrollBase(-1)">‹</button>
  <div class="bbs-wrap" id="bbsWrap">
    <div class="bbs" id="bbs"></div>
  </div>
  <button class="barr" id="bnext" onclick="scrollBase(1)">›</button>
</div>

<div class="main">
  <div class="card">
    <div class="ch">
      <div class="ct">환율 목록 <span id="cnt" style="font-weight:400;color:var(--tx3)"></span></div>
      <input class="tsrch" id="tsrch" placeholder="통화 검색…" oninput="filt()">
    </div>
    <div id="tbl"><div class="msg">데이터를 불러오는 중입니다…</div></div>
  </div>

  <div class="rp">
    <div class="card" id="cc">
      <div id="ctop"><div class="ph">통화를 클릭하면<br>상세 차트가 표시됩니다</div></div>
      <div id="cbody" style="display:none"><div class="cb"><div class="cw"><canvas id="mc"></canvas></div></div></div>
    </div>
    <div class="card" id="sc" style="display:none">
      <div class="ch"><div class="ct">기간 통계</div></div>
      <div class="sg" id="sg"></div>
    </div>
    <div class="card">
      <div style="padding:12px 18px;font-size:11px;color:var(--tx3);line-height:1.8">
        <strong style="font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:6px;color:var(--tx2)">데이터 출처</strong>
        유럽중앙은행 (ECB) 참조 환율<br>
        API: frankfurter.app · 32개 통화 지원<br>
        등락률: 전 영업일 대비
      </div>
    </div>
  </div>
</div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  Frankfurter 지원 32개 통화
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const CUR = {
  AUD:{n:'호주 달러',              f:'🇦🇺'},
  BGN:{n:'불가리아 레프',           f:'🇧🇬'},
  BRL:{n:'브라질 헤알',             f:'🇧🇷'},
  CAD:{n:'캐나다 달러',             f:'🇨🇦'},
  CHF:{n:'스위스 프랑',             f:'🇨🇭'},
  CNY:{n:'중국 위안',               f:'🇨🇳'},
  CZK:{n:'체코 코루나',             f:'🇨🇿'},
  DKK:{n:'덴마크 크로네',           f:'🇩🇰'},
  EUR:{n:'유로',                    f:'🇪🇺'},
  GBP:{n:'영국 파운드',             f:'🇬🇧'},
  HKD:{n:'홍콩 달러',               f:'🇭🇰'},
  HUF:{n:'헝가리 포린트',           f:'🇭🇺'},
  IDR:{n:'인도네시아 루피아',        f:'🇮🇩'},
  ILS:{n:'이스라엘 셰켈',           f:'🇮🇱'},
  INR:{n:'인도 루피',               f:'🇮🇳'},
  ISK:{n:'아이슬란드 크로나',        f:'🇮🇸'},
  JPY:{n:'일본 엔',                 f:'🇯🇵'},
  KRW:{n:'한국 원',                 f:'🇰🇷'},
  MXN:{n:'멕시코 페소',             f:'🇲🇽'},
  MYR:{n:'말레이시아 링깃',          f:'🇲🇾'},
  NOK:{n:'노르웨이 크로네',          f:'🇳🇴'},
  NZD:{n:'뉴질랜드 달러',           f:'🇳🇿'},
  PHP:{n:'필리핀 페소',             f:'🇵🇭'},
  PLN:{n:'폴란드 즈워티',           f:'🇵🇱'},
  RON:{n:'루마니아 레우',           f:'🇷🇴'},
  SEK:{n:'스웨덴 크로나',           f:'🇸🇪'},
  SGD:{n:'싱가포르 달러',           f:'🇸🇬'},
  THB:{n:'태국 바트',               f:'🇹🇭'},
  TRY:{n:'터키 리라',               f:'🇹🇷'},
  USD:{n:'미국 달러',               f:'🇺🇸'},
  ZAR:{n:'남아공 랜드',             f:'🇿🇦'},
  TWD:{n:'대만 달러',               f:'🇹🇼'},
};

const ALL_CODES = Object.keys(CUR); // 32개
const TICK_LIST = ['USD','EUR','JPY','GBP','CNY','CHF','AUD','CAD','HKD','NZD',
                   'SGD','KRW','INR','MXN','BRL','ZAR','TRY','SEK','NOK','PLN'];

const API = 'https://api.frankfurter.app';

// ── 상태 ──────────────────────────────────────────
const S = {
  base:   'USD',
  rates:  {},   // 오늘 (기준통화 기준)
  prev:   {},   // 전 영업일 (기준통화 기준)
  sparks: {},
  sel:    null,
  period: '1M',
  sortC:  'code',
  sortD:  1,
  q:      '',
  chart:  null,
  timer:  null,
  rateDate: '',   // 오늘 환율 날짜
  prevDate: '',   // 전 영업일 날짜
};

// ── 전 영업일 날짜 계산 ────────────────────────────
function prevBizDay(dateStr) {
  const d = new Date(dateStr + 'T12:00:00Z');
  d.setUTCDate(d.getUTCDate() - 1);
  while (d.getUTCDay() === 0 || d.getUTCDay() === 6) {
    d.setUTCDate(d.getUTCDate() - 1);
  }
  return d.toISOString().slice(0, 10);
}

// ── API ───────────────────────────────────────────
async function fetchToday() {
  const res = await fetch(`${API}/latest?from=${S.base}`);
  if (!res.ok) throw new Error('latest API 오류');
  const d = await res.json();
  d.rates[S.base] = 1;
  return d;
}

async function fetchPrev(dateStr) {
  const res = await fetch(`${API}/${dateStr}?from=${S.base}`);
  if (!res.ok) throw new Error('prev API 오류');
  const d = await res.json();
  d.rates[S.base] = 1;
  return d;
}

async function fetchSparks() {
  // 7일 시계열, 주요 통화
  const targets = TICK_LIST.filter(c => c !== S.base).join(',');
  if (!targets) return;
  try {
    const e = new Date(), s = new Date();
    s.setDate(s.getDate() - 9); // 주말 포함 여유
    const f = d => d.toISOString().slice(0, 10);
    const res = await fetch(`${API}/${f(s)}..${f(e)}?from=${S.base}&to=${targets}`);
    if (!res.ok) return;
    const data = await res.json();
    const dates = Object.keys(data.rates).sort();
    targets.split(',').forEach(k => {
      S.sparks[k] = dates.map(d => data.rates[d][k]).filter(Boolean);
    });
  } catch(e) {}
}

async function fetchHist(to, days) {
  const e = new Date(), s = new Date();
  s.setDate(s.getDate() - days);
  const f = d => d.toISOString().slice(0, 10);
  const res = await fetch(`${API}/${f(s)}..${f(e)}?from=${S.base}&to=${to}`);
  if (!res.ok) throw new Error('hist 오류');
  return (await res.json()).rates;
}

// ── 전체 로드 ──────────────────────────────────────
async function fetchAll() {
  const btn = document.getElementById('rb');
  btn.disabled = true; btn.textContent = '…';
  try {
    // 오늘 환율 먼저 받아서 날짜 확인 → 전 영업일 계산 → 병렬 fetch
    const todayData = await fetchToday();
    S.rateDate = todayData.date;
    S.prevDate  = prevBizDay(todayData.date);

    const prevData = await fetchPrev(S.prevDate);

    S.rates = todayData.rates;
    S.prev  = prevData.rates;

    updTs();
    renderTable();
    buildTick();
    await fetchSparks();
    renderTable();
    if (S.sel) await loadChart(S.sel);
  } catch(e) {
    document.getElementById('tbl').innerHTML =
      '<div class="msg" style="color:var(--dn)">⚠ 데이터를 불러올 수 없습니다<br>네트워크 상태를 확인해 주세요</div>';
  } finally {
    btn.disabled = false; btn.textContent = '↻ 새로고침';
  }
}

function updTs() {
  const now = new Date();
  document.getElementById('ts').textContent =
    now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('updInfo').textContent =
    `ECB 기준 · ${S.rateDate} 환율 · 전영업일: ${S.prevDate}`;
}

// ── 기준통화 버튼 ─────────────────────────────────
let _bbOff = 0;
const BB_STEP = 200;

function renderBases() {
  document.getElementById('bbs').innerHTML = ALL_CODES.map(c => {
    const v = CUR[c];
    return `<button class="bb ${c===S.base?'ac':''}" onclick="chBase('${c}')" title="${v.n}">${v.f} ${c}</button>`;
  }).join('');
  _bbOff = 0;
  requestAnimationFrame(scrollToActive);
}

function scrollToActive() {
  const wrap = document.getElementById('bbsWrap');
  const active = document.querySelector('.bb.ac');
  if (!active || !wrap) return;
  const wR = wrap.getBoundingClientRect(), bR = active.getBoundingClientRect();
  const center = bR.left - wR.left + bR.width/2;
  applyOff(_bbOff - (center - wR.width/2));
}

function applyOff(off) {
  const wrap = document.getElementById('bbsWrap');
  const track = document.getElementById('bbs');
  if (!wrap || !track) return;
  const max = track.scrollWidth - wrap.clientWidth;
  _bbOff = Math.min(0, Math.max(-max, off));
  track.style.transform = `translateX(${_bbOff}px)`;
  document.getElementById('bprev').disabled = _bbOff >= 0;
  document.getElementById('bnext').disabled = _bbOff <= -max;
}

function scrollBase(dir) { applyOff(_bbOff - dir * BB_STEP); }

async function chBase(b) {
  S.base = b;
  S.rates = {}; S.prev = {}; S.sparks = {}; S.sel = null;
  hideChart();
  renderBases();
  await fetchAll();
}

// ── 티커 ──────────────────────────────────────────
function buildTick() {
  const items = TICK_LIST.filter(c => c !== S.base && S.rates[c]).map(c => {
    const r=S.rates[c], p=S.prev[c];
    const pct = p ? (r-p)/p*100 : 0;
    const cls = pct>0?'u':pct<0?'d':'f';
    const ar  = pct>0?'▲':pct<0?'▼':'─';
    return `<div class="ti">${CUR[c].f} ${c} <span class="r">${fmt(c,r)}</span><span class="${cls}">${ar}${Math.abs(pct).toFixed(2)}%</span></div>`;
  });
  const h = items.join('') + items.join('');
  document.getElementById('tk').innerHTML = h || '<div class="ti">—</div>';
}

// ── 포매팅 ────────────────────────────────────────
function fmt(c, v) {
  if (v==null) return '—';
  if (v>=100000) return v.toLocaleString('ko-KR',{maximumFractionDigits:0});
  if (v>=10000)  return v.toLocaleString('ko-KR',{maximumFractionDigits:1});
  if (v>=1000)   return v.toLocaleString('ko-KR',{maximumFractionDigits:2});
  if (v>=1)      return v.toFixed(4);
  return v.toFixed(6);
}
function dc(v) { return !v?4:v>=1000?0:v>=1?4:6; }
function pct(c) {
  const r=S.rates[c], p=S.prev[c];
  return (r&&p) ? (r-p)/p*100 : 0;
}

// ── 테이블 ────────────────────────────────────────
function renderTable() {
  const q = S.q.toLowerCase();
  let codes = ALL_CODES
    .filter(c => c !== S.base)
    .filter(c => !q || c.toLowerCase().includes(q) || CUR[c].n.toLowerCase().includes(q));

  codes.sort((a,b) => {
    let va, vb;
    if (S.sortC==='code')   { va=a; vb=b; }
    else if (S.sortC==='rate') { va=S.rates[a]||0; vb=S.rates[b]||0; }
    else { va=pct(a); vb=pct(b); }
    if (typeof va==='string') return S.sortD*va.localeCompare(vb);
    return S.sortD*(va-vb);
  });

  document.getElementById('cnt').textContent = `(${codes.length})`;
  if (!codes.length) { document.getElementById('tbl').innerHTML='<div class="msg">검색 결과 없음</div>'; return; }

  const rows = codes.map(c => {
    const v=CUR[c], r=S.rates[c], p=S.prev[c];
    const pc=pct(c), ab=(r&&p)?r-p:null;
    const d=pc>0?1:pc<0?-1:0, ar=d>0?'▲':d<0?'▼':'─';

    const rH = r ? `<span class="rv">${fmt(c,r)}</span>` : `<span class="rv" style="color:var(--tx3)">—</span>`;
    const cH = r && p ? `
      <div class="chg">
        <span class="cp ${d>0?'cpu':d<0?'cpd':'cpf'}">${ar} ${Math.abs(pc).toFixed(3)}%</span>
        <span class="ca">${ab>=0?'+':''}${ab.toFixed(dc(r))}</span>
      </div>` : `<span style="color:var(--tx3);font-size:11px;font-family:var(--mono)">—</span>`;

    return `<tr class="${c===S.sel?'sel':''}" onclick="selCur('${c}')">
      <td><div class="cc">
        <span class="fl">${v.f}</span>
        <div><div class="cod">${c}</div><div class="nm">${v.n}</div></div>
      </div></td>
      <td class="r">${rH}</td>
      <td class="r">${cH}</td>
      <td class="r spc">${mkSpark(c)}</td>
    </tr>`;
  }).join('');

  const th = col => S.sortC===col?(S.sortD>0?'↑':'↓'):'';
  document.getElementById('tbl').innerHTML = `
    <table>
      <thead><tr>
        <th onclick="srt('code')" class="${S.sortC==='code'?'sd':''}">통화 ${th('code')}</th>
        <th class="r ${S.sortC==='rate'?'sd':''}" onclick="srt('rate')">환율 ${th('rate')}</th>
        <th class="r ${S.sortC==='change'?'sd':''}" onclick="srt('change')">등락 ${th('change')}</th>
        <th class="r spc">추이</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="fn">등락률: ${S.prevDate||'—'} → ${S.rateDate||'—'} (전 영업일 대비) · 출처: ECB / frankfurter.app</div>`;
}

function mkSpark(c) {
  const d=S.sparks[c], W=70, H=26, pad=2;
  if (!d||d.length<2) return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><line x1="0" y1="${H/2}" x2="${W}" y2="${H/2}" stroke="var(--bd)" stroke-width="1" stroke-dasharray="3,3"/></svg>`;
  const mn=Math.min(...d),mx=Math.max(...d),rng=mx-mn||1;
  const pts=d.map((v,i)=>{
    const x=pad+(i/(d.length-1))*(W-pad*2);
    const y=H-pad-((v-mn)/rng)*(H-pad*2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const up=d[d.length-1]>=d[0];
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><polyline points="${pts}" fill="none" stroke="${up?'var(--up)':'var(--dn)'}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}

function srt(col) { if(S.sortC===col)S.sortD*=-1; else{S.sortC=col;S.sortD=1;} renderTable(); }
function filt()   { S.q=document.getElementById('tsrch').value; renderTable(); }

// ── 통화 선택 & 차트 ──────────────────────────────
async function selCur(c) {
  S.sel=c; renderTable();
  await loadChart(c);
}

async function loadChart(c) {
  const v=CUR[c], r=S.rates[c], p=S.prev[c];
  const pc=pct(c), ab=(r&&p)?r-p:null;
  const d=pc>0?1:pc<0?-1:0, ar=d>0?'▲':d<0?'▼':'─';
  const cls=d>0?'tcu':d<0?'tcd':'tcf';

  document.getElementById('ctop').innerHTML=`<div class="cht">
    <div class="cfc"><span style="font-size:22px">${v.f}</span><span class="cco">${c}</span></div>
    <div class="cnm">${v.n} / ${S.base}</div>
    <div class="crt">${r?fmt(c,r):'—'}</div>
    <div class="cch ${cls}">${ar} ${Math.abs(pc).toFixed(3)}%${ab!=null?` (${ab>=0?'+':''}${ab.toFixed(dc(r))})`:''}</div>
    <div class="pr">${['1W','1M','3M','6M','1Y'].map(p=>`<button class="pb ${S.period===p?'ac':''}" onclick="chPer('${c}','${p}')">${p}</button>`).join('')}</div>
  </div>`;

  // canvas 구조 항상 복원 후 표시
  if (!document.getElementById('cbody').querySelector('canvas#mc')) {
    document.getElementById('cbody').innerHTML='<div class="cb"><div class="cw"><canvas id="mc"></canvas></div></div>';
    if(S.chart){S.chart.destroy();S.chart=null;}
  }
  document.getElementById('cbody').style.display='block';
  document.getElementById('sc').style.display='block';

  const dm={'1W':7,'1M':30,'3M':90,'6M':180,'1Y':365};
  try {
    const hist=await fetchHist(c, dm[S.period]);
    const dates=Object.keys(hist).sort();
    const vals=dates.map(d=>hist[d][c]).filter(Boolean);
    if(vals.length<2) throw new Error();
    drawChart(dates.slice(-vals.length), vals, c);
    renderStats(vals, c);
  } catch(e) {
    document.getElementById('cbody').innerHTML='<div class="ph" style="padding:20px">차트 데이터 없음</div>';
    if(S.chart){S.chart.destroy();S.chart=null;}
  }
}

function chPer(c,p){ S.period=p; loadChart(c); }

function drawChart(dates, vals, c) {
  const ctx=document.getElementById('mc').getContext('2d');
  if(S.chart) S.chart.destroy();
  const up=vals[vals.length-1]>=vals[0];
  const col=up?'#1a6e35':'#a81a1a';
  const g=ctx.createLinearGradient(0,0,0,175);
  g.addColorStop(0,up?'rgba(26,110,53,.1)':'rgba(168,26,26,.08)');
  g.addColorStop(1,'rgba(255,255,255,0)');
  S.chart=new Chart(ctx,{
    type:'line',
    data:{labels:dates,datasets:[{
      data:vals,borderColor:col,backgroundColor:g,borderWidth:1.5,
      pointRadius:0,pointHoverRadius:3,pointHoverBackgroundColor:col,tension:.35,fill:true
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'rgba(15,15,14,.92)',borderColor:'rgba(0,0,0,.08)',borderWidth:1,
          titleColor:'rgba(255,255,255,.45)',bodyColor:'#fff',
          titleFont:{family:'Noto Sans Mono',size:10},bodyFont:{family:'Noto Sans Mono',size:12},
          callbacks:{title:i=>i[0].label,label:i=>' '+fmt(c,i.raw)}
        }
      },
      scales:{
        x:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#9898a0',font:{family:'Noto Sans Mono',size:9},maxTicksLimit:6,maxRotation:0},border:{display:false}},
        y:{position:'right',grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#9898a0',font:{family:'Noto Sans Mono',size:9},maxTicksLimit:5,callback:v=>fmt(c,v)},border:{display:false}}
      }
    }
  });
}

function renderStats(vals,c) {
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const avg=vals.reduce((a,b)=>a+b)/vals.length;
  const tot=(vals[vals.length-1]-vals[0])/vals[0]*100;
  document.getElementById('sg').innerHTML=`
    <div class="st"><div class="sl">최고</div><div class="sv tcu">${fmt(c,mx)}</div></div>
    <div class="st"><div class="sl">최저</div><div class="sv tcd">${fmt(c,mn)}</div></div>
    <div class="st"><div class="sl">평균</div><div class="sv">${fmt(c,avg)}</div></div>
    <div class="st"><div class="sl">기간 등락</div><div class="sv ${tot>=0?'tcu':'tcd'}">${tot>=0?'+':''}${tot.toFixed(2)}%</div></div>`;
}

function hideChart() {
  document.getElementById('ctop').innerHTML='<div class="ph">통화를 클릭하면<br>상세 차트가 표시됩니다</div>';
  document.getElementById('cbody').style.display='none';
  document.getElementById('sc').style.display='none';
  if(S.chart){S.chart.destroy();S.chart=null;}
}

// ── 자동 갱신 (5분 — ECB는 하루 1회지만 장중 변동 감지용) ──
function startRefresh() {
  clearInterval(S.timer);
  S.timer=setInterval(fetchAll, 5*60*1000);
}

// ── 초기화 ────────────────────────────────────────
(async()=>{
  renderBases();
  await fetchAll();
  startRefresh();
})();

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  국제 뉴스 슬라이더
//  allorigins.win CORS 프록시로 RSS 직접 파싱
//  키 없음, GitHub Pages 작동
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const NEWS_FEEDS = [
  { src:'BBC World',  rss:'https://feeds.bbci.co.uk/news/world/rss.xml' },
  { src:'Al Jazeera', rss:'https://www.aljazeera.com/xml/rss/all.xml' },
  { src:'AP News',    rss:'https://feeds.apnews.com/rss/apf-topnews' },
  { src:'NPR World',  rss:'https://feeds.npr.org/1004/rss.xml' },
];
const PROXY = url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

const NS = { items:[], cur:0, timer:null };

async function fetchOneFeed(feed) {
  const res = await fetch(PROXY(feed.rss));
  if (!res.ok) throw new Error();
  const { contents } = await res.json();
  const parser = new DOMParser();
  const doc = parser.parseFromString(contents, 'text/xml');
  const items = [...doc.querySelectorAll('item')].slice(0, 6);
  return items.map(it => ({
    src:   feed.src,
    title: it.querySelector('title')?.textContent?.trim() || '',
    link:  it.querySelector('link')?.textContent?.trim() ||
           it.querySelector('guid')?.textContent?.trim() || '#',
  })).filter(it => it.title);
}

async function fetchNews() {
  const results = await Promise.allSettled(NEWS_FEEDS.map(fetchOneFeed));
  const arrays = results.filter(r=>r.status==='fulfilled').map(r=>r.value);
  if (!arrays.length) return;
  // 소스 번갈아 섞기
  const out = [];
  const maxLen = Math.max(...arrays.map(a=>a.length));
  for (let i=0; i<maxLen; i++)
    arrays.forEach(a=>{ if(a[i]) out.push(a[i]); });
  NS.items = out.slice(0, 20);
  if (NS.items.length) renderNewsSlides();
}

function renderNewsSlides() {
  const slides = document.getElementById('newsSlides');
  const dots   = document.getElementById('newsDots');
  slides.innerHTML = NS.items.map((it)=>`
    <div class="news-slide" onclick="window.open(${JSON.stringify(it.link)},'_blank')">
      <div class="news-src">${it.src}</div>
      <div class="news-ttl">${it.title}</div>
    </div>`).join('');
  dots.innerHTML = NS.items.map((_,i)=>
    `<div class="nd ${i===0?'ac':''}" onclick="goNews(${i})"></div>`).join('');
  goNews(0);
  startNewsAuto();
}

function goNews(idx) {
  NS.cur = (idx + NS.items.length) % NS.items.length;
  document.getElementById('newsSlides').style.transform = `translateX(-${NS.cur*100}%)`;
  document.querySelectorAll('.nd').forEach((d,i)=>d.classList.toggle('ac',i===NS.cur));
}

function newsNav(dir) {
  clearInterval(NS.timer);
  goNews(NS.cur + dir);
  startNewsAuto();
}

function startNewsAuto() {
  clearInterval(NS.timer);
  NS.timer = setInterval(()=>goNews(NS.cur+1), 5000);
}

fetchNews();
setInterval(fetchNews, 10*60*1000);

</script>
